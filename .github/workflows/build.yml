name: Build Minecraft Plugin

on:
  push:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '25'

      - name: Permissão Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Plugin
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-plugin
          path: build/libs/*.jar